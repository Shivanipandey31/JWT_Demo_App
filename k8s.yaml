apiVersion: apps/v1
kind: Deployment
metadata:
  name: jwt-app
  namespace: demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: jwt-app
  template:
    metadata:
      labels:
        app: jwt-app
    spec:
      containers:
        - name: jwt-app
          image: jwt-demo:v1
          imagePullPolicy: Never   # use the image loaded into kind
          ports:
            - containerPort: 8080
          env:
            - name: PORT
              value: "8080"
---
apiVersion: v1
kind: Service
metadata:
  name: jwt-app
  namespace: demo
spec:
  selector:
    app: jwt-app
  ports:
    - port: 8080
      targetPort: 8080
  type: ClusterIP
---
apiVersion: v1
kind: Service
metadata:
  name: jwt-app-headless
  namespace: demo
spec:
  clusterIP: None
  selector:
    app: jwt-app
  ports:
    - name: http
      port: 8080
      targetPort: 8080
